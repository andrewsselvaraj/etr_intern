<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration</title>
    <style>
        body {
            font-family: Arial;
            background-color: lightblue;
        }

        form {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid gray;
        }

        input {
            width: 100%;
            margin: 5px 0 10px;
            padding: 5px;
        }

        button {
            padding: 5px 10px;
            background-color: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<form>
    <h2>Employee Registration</h2>

    Employee ID:
    <input type="text">

    Name:
    <input type="text">

    Email:
    <input type="email">

    <button type="submit">Register</button>
</form>

</body>
</html>
