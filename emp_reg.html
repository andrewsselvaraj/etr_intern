<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9e8f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #db3482;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #db3482;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Employee Registration</h2>

    <form>
        <label>Employee ID</label>
        <input type="text">

        <label>Full Name</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Phone Number</label>
        <input type="tel">

        <label>Department</label>
        <input type="text">

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
